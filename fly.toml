# Configuration Fly.io — La Réserve (backend NestJS)
# Remplace "la-reserve-api" par le nom que tu choisis sur fly.io
app = "la-reserve-api"
primary_region = "cdg"  # Paris

[build]
  dockerfile = "backend/Dockerfile"
  # Le contexte Docker est la racine du monorepo (nécessaire pour pnpm workspaces)

[env]
  PORT = "3000"
  NODE_ENV = "production"

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 1   # Toujours 1 machine active → pas de cold start pendant le service

[[vm]]
  memory = "256mb"
  cpu_kind = "shared"
  cpus = 1
